name: Codex Review Follow-up

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  codex-review-followup:
    if: github.event.sender.login == 'chatgpt-codex-connector[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Create follow-up issue for actionable Codex feedback
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const eventName = context.eventName;
            const payload = context.payload;

            function getPullRequestRef() {
              if (eventName === 'issue_comment') {
                if (!payload.issue.pull_request) return null;
                return { number: payload.issue.number };
              }

              if (eventName === 'pull_request_review') {
                return { number: payload.pull_request.number };
              }

              if (eventName === 'pull_request_review_comment') {
                return { number: payload.pull_request.number };
              }

              return null;
            }

            function getFeedback() {
              if (eventName === 'issue_comment') {
                return {
                  id: payload.comment.id,
                  body: payload.comment.body || '',
                  url: payload.comment.html_url,
                  source: 'issue_comment',
                };
              }

              if (eventName === 'pull_request_review') {
                return {
                  id: payload.review.id,
                  body: payload.review.body || '',
                  url: payload.review.html_url,
                  source: 'pull_request_review',
                };
              }

              return {
                id: payload.comment.id,
                body: payload.comment.body || '',
                url: payload.comment.html_url,
                source: 'pull_request_review_comment',
              };
            }

            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name,
                  color,
                  description,
                });
              }
            }

            async function addLabel(issue_number, name) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [name],
              });
            }

            const prRef = getPullRequestRef();
            if (!prRef) return;

            const feedback = getFeedback();
            const body = feedback.body.trim();
            if (!body) return;

            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prRef.number,
            });

            await ensureLabel('codex-feedback', 'D93F0B', 'Actionable GitHub Codex review feedback exists.');
            await ensureLabel('codex-reviewed', '0E8A16', 'GitHub Codex found no major issues.');
            await ensureLabel('codex-follow-up', '5319E7', 'Issue created from GitHub Codex review feedback.');

            const noMajorIssue = /did(?:n't| not) find any major issues|no major issues|major issues \uC5C6\uC74C/i.test(body);
            if (noMajorIssue) {
              await addLabel(prRef.number, 'codex-reviewed');
              return;
            }

            const genericReviewEnvelope = /Here are some automated review suggestions/i.test(body)
              && eventName === 'pull_request_review';
            if (genericReviewEnvelope) return;

            await addLabel(prRef.number, 'codex-feedback');

            const marker = `codex-review-followup-pr-${prRef.number}`;
            const searchQuery = `repo:${owner}/${repo} is:issue is:open "${marker}"`;
            const { data: search } = await github.rest.search.issuesAndPullRequests({
              q: searchQuery,
              per_page: 1,
            });

            const excerpt = body.length > 3500 ? `${body.slice(0, 3500)}\n\n...` : body;
            const issueBody = [
              `<!-- ${marker} -->`,
              `# Codex Review Follow-up: PR #${prRef.number}`,
              '',
              '## Source PR',
              `- PR: #${prRef.number}`,
              `- Head SHA: \`${pr.head.sha}\``,
              `- Review source: ${feedback.source}`,
              `- Review link: ${feedback.url}`,
              '',
              '## Review Feedback',
              '',
              excerpt,
              '',
              '## Handling Checklist',
              '',
              '- [ ] Confirm whether the feedback still applies to current code/docs',
              '- [ ] Decide whether to apply or defer the feedback',
              '- [ ] Run required tests and verification',
              '- [ ] Leave the decision rationale on the PR thread or comment',
              '- [ ] Request `@codex review` again if substantive changes are made',
            ].join('\n');

            if (search.items.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: search.items[0].number,
                body: [
                  `Additional Codex feedback was added to PR #${prRef.number}.`,
                  '',
                  `- Head SHA: \`${pr.head.sha}\``,
                  `- Review link: ${feedback.url}`,
                  '',
                  excerpt,
                ].join('\n'),
              });
              return;
            }

            await github.rest.issues.create({
              owner,
              repo,
              title: `Codex review follow-up: PR #${prRef.number}`,
              body: issueBody,
              labels: ['codex-follow-up', 'codex-feedback'],
            });
